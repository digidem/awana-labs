name: autofix.ci

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint with fix
        run: npm run lint -- --fix

      - name: Run Prettier
        run: npx prettier --write "src/**/*.{ts,tsx,css,json,md}" "e2e/**/*.ts" "e2e-live/**/*.ts"

      - name: Run autofix.ci
        uses: autofix-ci/action@ff5e2e6e16312a8d1c2d8a3f0f1e3e9a2f6d9a1f1b6c2b # v1.3.3
