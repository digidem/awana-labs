<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="only light" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />
    <title>Awana Labs - Open Source Projects</title>
    <meta name="description" content="Awana Labs - Building the future of digital infrastructure with open source tools, libraries, and frameworks." />
    <meta name="author" content="Awana Labs" />

    <meta property="og:title" content="Awana Labs - Open Source Projects" />
    <meta property="og:description" content="Building the future of digital infrastructure with open source tools, libraries, and frameworks." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@AwanaLabs" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      // SPA redirect: static hosts (e.g. GitHub Pages) serve 404.html for any
      // path that doesn't match a file. Redirect to the built index so the React
      // app boots and HashRouter handles the route via the hash fragment.
      var l = window.location;
      var base = "/awana-labs/";
      l.replace(l.origin + base + "#/" + l.pathname.slice(base.length) + l.search);
    </script>
  </body>
</html>
